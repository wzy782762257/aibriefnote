name: Daily content update

on:
  workflow_dispatch:
  schedule:
    - cron: "18 1 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate daily content
        run: npm run update-content

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sitemap.xml articles
          git diff --cached --quiet || git commit -m "chore: update daily brief"
          git push
